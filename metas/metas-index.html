<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metas | Lúmen</title>
    <link rel="icon" type="image" href="../img/lumen.logo.png">



    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="metas.css">

</head>

<body>

    <div class="container">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <div class="logo">
                <img src="../img/lumen.logo.png" alt="Lúmen" onclick="window.location.href='../home/home.html'">
            </div>

            <nav class="menu">
                
                <a href="#" class="active metas">

                    <i class="fa-solid fa-bullseye"></i>

                    <span>Metas</span>

                </a>

                <a href="../financeiro/financeiro.html" class="financeiro">

                    <i class="fa-solid fa-wallet"></i>

                    <span>Financeiro</span>

                </a>

                        
                <a href="../memorias/memorias.html">

                    <i class="fa-solid fa-image"></i>

                    <span>Memórias</span>

                </a>

                <a href="../diario/diario.html">

                    <i class="fa-solid fa-book-open"></i>

                    <span>Diário</span>

                </a>

                
            </nav>

        </aside>

        <!-- CONTEÚDO -->
        <main class="main-content">

            <!-- HEADER -->
            <header class="topo">

                <div>
                    <h1>Minhas Metas</h1>
                    <p>Organize seus objetivos e acompanhe seu progresso.</p>
                </div>

                <button id="abrirModal" class="btn-add-metas">
                    <i class="fa-solid fa-plus"></i> Nova Meta
                </button>

            </header>

            <!-- FILTROS -->
            <section class="filtros">

                <select id="filtroStatus">
                    <option value="">Todos os status</option>
                    <option value="a fazer">A fazer</option>
                    <option value="em andamento">Em andamento</option>
                    <option value="concluída">Concluída</option>
                </select>

                <select id="filtroPrioridade">
                    <option value="">Todas prioridades</option>
                    <option value="Alta">Alta</option>
                    <option value="Média">Média</option>
                    <option value="Baixa">Baixa</option>
                </select>

                
                <button id="limparFiltrosMetas" class="limpar-filtros" type="button">Limpar</button>

            </section>

            <!-- LISTA DE METAS -->
            <section id="listaMetas" class="lista-metas">

                <!--
                    AS METAS VIRÃO DO BACKEND
                    NÃO EXISTEM DADOS FIXOS AQUI
                -->

            </section>

        </main>

    </div>

    <!-- MODAL -->
    <div class="modal" id="modalMeta">

        <div class="modal-content">

            <div class="modal-header">

                <h2 id="modal-title">Criar Nova Meta</h2>

                <button id="fecharModal">
                    ✖
                </button>

            </div>

            <form id="formMeta">

                <!-- TÍTULO -->
                <div class="grupo-input">

                    <label>Título da Meta</label>

                    <input 
                        type="text"
                        id="titulo"
                        name="titulo"
                        required
                    >

                </div>

                <!-- DESCRIÇÃO -->
                <div class="grupo-input">

                    <label>Descrição</label>

                    <textarea 
                        id="descricao"
                        name="descricao"
                        rows="4"
                    ></textarea>

                </div>

                <!-- PRAZO -->
                <div class="grupo-input">

                    <label>Data</label>

                    <input 
                        type="date"
                        id="data_meta"
                        name="data_meta"
                        required
                    >

                </div>

                <!-- PRIORIDADE -->
                <div class="grupo-input">

                    <label>Prioridade</label>

                    <select 
                        id="prioridade"
                        name="prioridade"
                        required
                    >

                        <option value="">Selecione</option>
                        <option value="Alta">Alta</option>
                        <option value="Média">Média</option>
                        <option value="Baixa">Baixa</option>

                    </select>

                </div>

                <!-- CATEGORIA -->
                <div class="grupo-input">

                    <label>Categoria</label>

                    <select 
                        id="categoria"
                        name="categoria"
                        required
                    >

                        <option value="">Selecione</option>

                        <option value="Pessoal">
                            Pessoal
                        </option>

                        <option value="Estudos">
                            Estudos
                        </option>

                        <option value="Financeiro">
                            Financeiro
                        </option>

                        <option value="Saúde">
                            Saúde
                        </option>

                        <option value="Trabalho">
                            Trabalho
                        </option>

                        <option value="Outro">
                            Outro
                        </option>

                        <option value="Teste">
                            Teste
                        </option>

                    </select>

                </div>

                <!-- TASKS -->
                <div class="grupo-input">

                    <label>Tarefas da Meta</label>
                    <p class="tasks-hint">Adicione etapas para atingir sua meta. O progresso será calculado automaticamente.</p>

                    <div class="tasks-add-row">
                        <input
                            type="text"
                            id="novaTaskInput"
                            placeholder="Ex: Comprar passagem, Reservar hotel..."
                            autocomplete="off"
                        >
                        <button type="button" id="btnAdicionarTask">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>

                    <ul id="listaTasks" class="lista-tasks-modal"></ul>

                </div>

                <!-- BOTÕES -->
                <div class="acoes-form">

                    <button type="submit" class="salvar  ">
                        <i class="fa-solid fa-floppy-disk"></i> Salvar Meta
                    </button>

                    <button type="button" class="cancelar" id="cancelarModal">
                        Cancelar
                    </button>

                </div>

            </form>

        </div>

    </div>

    <script src="metas.js"></script>

</body>
</html>
