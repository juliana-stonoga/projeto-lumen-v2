<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financeiro | Lúmen</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="financeiro.css">
</head>
<body>

  <div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="logo">
        <img src="../img/lumen.logo.png" alt="Lúmen" onclick="window.location.href='../home/home.html'">
      </div>
      <nav class="menu">
        
        <a href="../metas/metas-index.html">
          <i class="fa-solid fa-bullseye"></i>
          <span>Metas</span>
        </a>
        <a href="#" class="active">
          <i class="fa-solid fa-wallet"></i>
          <span>Financeiro</span>
        </a>
        <a href="../memorias/index.html">
          <i class="fa-solid fa-image"></i>
          <span>Memórias</span>
        </a>
        <a href="../diario/index.html">
          <i class="fa-solid fa-book-open"></i>
          <span>Diário</span>
        </a>
      </nav>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="main-content">

      <!-- HEADER -->
      <header class="topo">
        <div>
          <h1>Financeiro</h1>
          <p>Controle suas receitas e despesas com facilidade.</p>
        </div>
        <button id="abrirModalTransacao">
          + Nova Transação
        </button>
      </header>

      <!-- FILTROS -->
      <section class="filtros">
        <select id="filtroMes" onchange="aplicarFiltro()">
          <option value="">Todos os meses</option>
          <option value="01">Janeiro</option>
          <option value="02">Fevereiro</option>
          <option value="03">Março</option>
          <option value="04">Abril</option>
          <option value="05">Maio</option>
          <option value="06">Junho</option>
          <option value="07">Julho</option>
          <option value="08">Agosto</option>
          <option value="09">Setembro</option>
          <option value="10">Outubro</option>
          <option value="11">Novembro</option>
          <option value="12">Dezembro</option>
        </select>
        <select id="filtroTipo" onchange="aplicarFiltro()">
          <option value="">Todos os tipos</option>
          <option value="entrada">Entradas</option>
          <option value="saida">Saídas</option>
        </select>
        <button id="limparFiltrosDireita" class="limpar-filtros" type="button" title="Limpar filtros" onclick="limparFiltros()">Limpar</button>
      </section>

      <!-- RESUMO -->
      <section class="resumo-cards">
        <div class="resumo-card entrada">
          <div class="resumo-icon"><i class="fa-solid fa-arrow-trend-up"></i></div>
          <div>
            <small>Total Entradas</small>
            <h4 id="resumoEntradas">R$ 0,00</h4>
          </div>
        </div>
        <div class="resumo-card saida">
          <div class="resumo-icon"><i class="fa-solid fa-arrow-trend-down"></i></div>
          <div>
            <small>Total Saídas</small>
            <h4 id="resumoSaidas">R$ 0,00</h4>
          </div>
        </div>
        <div class="resumo-card saldo">
          <div class="resumo-icon"><i class="fa-solid fa-scale-balanced"></i></div>
          <div>
            <small>Saldo</small>
            <h4 id="resumoSaldo">R$ 0,00</h4>
          </div>
        </div>
      </section>

      <!-- LISTA DE TRANSAÇÕES -->
      <section id="financeiroContent" class="lista-transacoes">
        <p class="vazio">Nenhuma transação cadastrada ainda.</p>
      </section>

    </main>
  </div>

  <!-- MODAL NOVA / EDITAR TRANSAÇÃO -->
  <div class="modal" id="modalTransacao">
    <div class="modal-content">

      <div class="modal-header">
        <h2 id="modalTitulo">Nova Transação</h2>
        <button id="fecharModalTransacao">✖</button>
      </div>

      <form id="formTransacao">
        <input type="hidden" id="transacaoId">

        <!-- TIPO -->
        <div class="grupo-input">
          <label>Tipo de Transação</label>
          <div class="tipo-toggle">
            <label class="tipo-opcao entrada-opcao">
              <input type="radio" name="tipo" value="entrada" id="tipoEntrada" required>
              <span><i class="fa-solid fa-arrow-trend-up"></i> Entrada</span>
            </label>
            <label class="tipo-opcao saida-opcao">
              <input type="radio" name="tipo" value="saida" id="tipoSaida">
              <span><i class="fa-solid fa-arrow-trend-down"></i> Saída</span>
            </label>
          </div>
        </div>

        <!-- TÍTULO -->
        <div class="grupo-input">
          <label for="titulo">Título</label>
          <input
            type="text"
            id="titulo"
            name="titulo"
            placeholder="Ex: Salário, Aluguel..."
            required
          >
        </div>

        <!-- DESCRIÇÃO -->
        <div class="grupo-input">
          <label for="descricao">Descrição</label>
          <textarea
            id="descricao"
            name="descricao"
            rows="3"
            placeholder="Detalhes sobre a transação..."
          ></textarea>
        </div>

        <!-- VALOR -->
        <div class="grupo-input">
          <label for="valor">Valor (R$)</label>
          <input
            type="number"
            step="0.01"
            min="0"
            id="valor"
            name="valor"
            placeholder="0,00"
            required
          >
        </div>

        <!-- DATA -->
        <div class="grupo-input">
          <label for="data_financeira">Data da Transação</label>
          <input
            type="date"
            id="data_financeira"
            name="data_financeira"
            required
          >
        </div>

        <!-- BOTÕES -->
        <div class="acoes-form">
          <button type="submit" class="salvar">Salvar Transação</button>
          <button type="button" class="cancelar" id="cancelarModal">Cancelar</button>
        </div>
      </form>

    </div>
  </div>

  <!-- MODAL EDITAR (mantido para compatibilidade) -->
  <div id="modalEditar"
       style="display:none; position:fixed; inset:0;
              background:rgba(0,0,0,0.5); z-index:9999;
              align-items:center; justify-content:center;">
    <div class="modal-content" style="max-width:440px; margin:1rem;">
      <div class="modal-header">
        <h2>Editar Transação</h2>
        <button onclick="fecharModalEditar()">✖</button>
      </div>
      <form style="display:flex; flex-direction:column; gap:18px;">
        <input type="hidden" id="editId">
        <div class="grupo-input">
          <label>Tipo</label>
          <select id="editTipo">
            <option value="entrada">Entrada</option>
            <option value="saida">Saída</option>
          </select>
        </div>
        <div class="grupo-input">
          <label>Título</label>
          <input type="text" id="editTitulo" placeholder="Título">
        </div>
        <div class="grupo-input">
          <label>Descrição</label>
          <input type="text" id="editDescricao" placeholder="Descrição">
        </div>
        <div class="grupo-input">
          <label>Valor (R$)</label>
          <input type="number" step="0.01" id="editValor" placeholder="Valor">
        </div>
        <div class="grupo-input">
          <label>Data</label>
          <input type="date" id="editData">
        </div>
        <div class="acoes-form">
          <button type="button" class="salvar" onclick="salvarEdicao()">Salvar</button>
          <button type="button" class="cancelar" onclick="fecharModalEditar()">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="financeiro.js"></script>
</body>
</html>
