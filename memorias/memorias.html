<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memórias | Lúmen</title>
  <link rel="icon" type="image" href="../img/lumen.logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="memorias.css">
  <link rel="stylesheet" href="../css/perfil.css">
  <link rel="stylesheet" href="../css/modal-excluir.css">
</head>
<body>

  <!-- ══════════════════════════════════════════════
       MODAIS fora do .container para nunca sofrerem
       influência de overflow / transform do layout
  ════════════════════════════════════════════════ -->

  <!-- MODAL CRIAR / EDITAR -->
  <div class="modal" id="modalMemoria">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modalTitulo">Nova Memória</h2>
        <button type="button" id="fecharModalMemoria" class="btn-fechar">✖</button>
      </div>

      <form id="formMemoria">
        <input type="hidden" id="memoriaId">
        <input type="hidden" id="imagemUrlSalva">

        <!-- UPLOAD -->
        <div class="upload-area" id="uploadArea">
          <div class="upload-placeholder" id="uploadPlaceholder">
            <i class="fa-regular fa-image upload-ico"></i>
            <p class="up-main">Clique ou arraste uma foto aqui</p>
            <p class="up-sub">JPG, PNG, WEBP · máx. 5 MB</p>
          </div>
          <div class="upload-preview" id="uploadPreview">
            <img id="imgPreview" src="" alt="Preview">
            <button type="button" id="removerImagem" class="btn-remover-img" title="Remover foto">
              <i class="fa-solid fa-xmark"></i>
            </button>
            <button type="button" id="trocarImagem" class="btn-trocar-img">
              <i class="fa-solid fa-arrows-rotate"></i> Trocar foto
            </button>
          </div>
          <input type="file" id="inputImagem" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none">
        </div>

        <!-- TÍTULO -->
        <div class="grupo">
          <label for="titulo">Título</label>
          <input type="text" id="titulo" name="titulo" placeholder="Dê um nome a este momento..." required>
        </div>

        <!-- DESCRIÇÃO -->
        <div class="grupo">
          <label for="descricao">Descrição</label>
          <textarea id="descricao" name="descricao" rows="3" placeholder="Conte o que aconteceu..."></textarea>
        </div>

        <!-- DATA + CATEGORIA -->
        <div class="linha-dupla">
          <div class="grupo">
            <label for="data_memoria">Data</label>
            <input type="date" id="data_memoria" name="data_memoria" required>
          </div>
          <div class="grupo">
            <label for="categoria">Categoria</label>
            <select id="categoria" name="categoria">
              <option value="">Selecione</option>
              <option value="Viagem">✈️ Viagem</option>
              <option value="Família">👨‍👩‍👧 Família</option>
              <option value="Amigos">👥 Amigos</option>
              <option value="Conquista">🏆 Conquista</option>
              <option value="Amor">❤️ Amor</option>
              <option value="Trabalho">💼 Trabalho</option>
              <option value="Outro">📌 Outro</option>
            </select>
          </div>
        </div>

        <!-- HUMOR -->
        <div class="grupo">
          <label>Como você se sentiu?</label>
          <div class="humor-grid">
            <label class="humor-op"><input type="radio" name="humor" value="muito_bem"><span>😄 Muito bem</span></label>
            <label class="humor-op"><input type="radio" name="humor" value="bem"><span>🙂 Bem</span></label>
            <label class="humor-op"><input type="radio" name="humor" value="neutro"><span>😐 Neutro</span></label>
            <label class="humor-op"><input type="radio" name="humor" value="saudade"><span>🥺 Saudade</span></label>
          </div>
        </div>

        <!-- ★★★ NOVO CAMPO — PASSO 1 DE 4: HTML (Memórias) ★★★
             Adicione o <input> do novo campo AQUI, antes dos botões de ação.
             Exemplo: campo "Local do evento"

             <div class="grupo">
                 <label for="local_evento">Local</label>
                 <input type="text" id="local_evento" name="local_evento"
                        placeholder="Onde aconteceu este momento?">
             </div>

             PRÓXIMO PASSO → memorias/memorias.js (PASSO 2)
        -->

        <div class="form-acoes">
          <button type="submit" class="btn-salvar" id="btnSalvar">
            <i class="fa-solid fa-floppy-disk"></i> Salvar Memória
          </button>
          <button type="button" class="btn-cancelar" id="cancelarModal">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODAL VISUALIZAR -->
  <div class="modal" id="modalVisualizar">
    <div class="modal-viz" id="modalVizBox">
      <div class="viz-img-col" id="vizImgCol">
        <img id="vizImg" src="" alt="">
      </div>
      <div class="viz-info-col">
        <div class="viz-info-header">
          <h2 id="vizTitulo"></h2>
          <button type="button" id="fecharModalVisualizar" class="btn-fechar">✖</button>
        </div>
        <div class="viz-info-body">
          <div class="viz-linha">
            <i class="fa-regular fa-calendar viz-ic"></i><span id="vizData"></span>
          </div>
          <div class="viz-linha" id="vizCatLinha">
            <i class="fa-solid fa-tag viz-ic"></i><span id="vizCategoria"></span>
          </div>
          <div class="viz-linha" id="vizHumorLinha">
            <i class="fa-regular fa-face-smile viz-ic"></i><span id="vizHumor"></span>
          </div>
          <div class="viz-desc" id="vizDescWrap">
            <p id="vizDescricao"></p>
          </div>
        </div>
        <div class="viz-acoes">
          <button class="btn-editar-viz" id="vizEditar"><i class="fa-solid fa-pen"></i> Editar</button>
          <button class="btn-excluir-viz" id="vizExcluir"><i class="fa-solid fa-trash"></i> Excluir</button>
        </div>
      </div>
    </div>
  </div>

  <!-- LAYOUT PRINCIPAL -->
  <div class="container">
    <aside class="sidebar">
      <div class="logo">
        <img src="../img/lumen.logo.png" alt="Lúmen" onclick="window.location.href='../home/home.html'">
      </div>
      <nav class="menu">
        <a href="../metas/metas-index.html" class="metas">
          <i class="fa-solid fa-bullseye"></i><span>Metas</span>
        </a>
        <a href="../financeiro/financeiro.html" class="financeiro">
          <i class="fa-solid fa-wallet"></i><span>Financeiro</span>
        </a>
        <a href="#" class="active memorias">
          <i class="fa-solid fa-image"></i><span>Memórias</span>
        </a>
        <a href="../diario/diario.html">
          <i class="fa-solid fa-book-open"></i><span>Diário</span>
        </a>
      </nav>

      <!-- PERFIL DO USUÁRIO -->
      <div class="perfil-sidebar">
        <div class="perfil-avatar" id="perfil-iniciais">?</div>
        <div class="perfil-info">
          <span class="perfil-nome" id="perfil-nome">Carregando...</span>
          <span class="perfil-email" id="perfil-email"></span>
        </div>
        <a href="../home/cliente_alterar.html" class="perfil-config" title="Minha Conta">
          <i class="fa-solid fa-gear"></i>
        </a>
      </div>

    </aside>

    <main class="main-content">
      <header class="topo">
        <div>
          <h1>Minhas Memórias</h1>
          <p>Guarde os momentos que fazem parte da sua história.</p>
        </div>
        <button id="abrirModalMemoria" class="btn-add-memorias">
          <i class="fa-solid fa-plus"></i> Nova Memória
        </button>
      </header>

      <section class="filtros">
        <select id="filtroCategoria" onchange="aplicarFiltro()">
          <option value="">Todas as categorias</option>
          <option value="Viagem">Viagem</option>
          <option value="Família">Família</option>
          <option value="Amigos">Amigos</option>
          <option value="Conquista">Conquista</option>
          <option value="Amor">Amor</option>
          <option value="Trabalho">Trabalho</option>
          <option value="Outro">Outro</option>
        </select>
        <select id="filtroAno" onchange="aplicarFiltro()">
          <option value="">Todos os anos</option>
        </select>
        <button class="limpar-filtros" onclick="limparFiltros()">Limpar</button>
      </section>

      <section id="galeria" class="galeria">
        <p class="vazio">Nenhuma memória cadastrada ainda.</p>
      </section>
    </main>
  </div>

  <!-- Modal de confirmação de exclusão -->
  <div id="modal-excluir-global" class="modal-overlay-excluir" style="display:none"
       onclick="if(event.target===this)_fecharModalExcluir()">
    <div class="modal-card-excluir">
      <div class="modal-excluir-icon">
        <i class="fa-solid fa-triangle-exclamation"></i>
      </div>
      <h2 class="modal-excluir-titulo" id="modal-excluir-titulo">Excluir?</h2>
      <p class="modal-excluir-msg" id="modal-excluir-msg">Esta ação é permanente e não poderá ser desfeita.</p>
      <div class="modal-excluir-acoes">
        <button type="button" class="modal-btn-cancel" onclick="_fecharModalExcluir()">Cancelar</button>
        <button type="button" class="modal-btn-delete" onclick="_confirmarExclusaoOk()">
          <i class="fa-solid fa-trash-can"></i> Excluir
        </button>
      </div>
    </div>
  </div>

  <script src="../js/modal-excluir.js"></script>
  <script src="../js/valida_sessao.js"></script>
  <script src="memorias.js"></script>
  <script>document.addEventListener('DOMContentLoaded', valida_sessao);</script>
</body>
</html>
