<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="cliente_alterar.css">
    <title>Minha Conta | Lúmen</title>
    <link rel="icon" type="image" href="../img/lumen.logo.png">
</head>

<body>

    <nav class="custom-navbar">
        <button class="back-btn" onclick="window.location.href='../home/home.html'">
            <i class="fa-solid fa-arrow-left"></i>
            Voltar
        </button>
        <a class="navbar-center-logo">
            <img src="../img/lumen.logo.png" alt="Logo LÚMEN" class="logo-navbar">
        </a>
    </nav>

    <input type="hidden" id="id">

    <div class="page-header">
        <h1>Minha Conta</h1>
        <p>Suas informações pessoais</p>
    </div>

    <!-- Modo visualização (padrão) -->
    <div id="view-mode" class="account-card">
        <div class="field-row">
            <div class="field-label"><i class="fa-solid fa-user"></i> Nome</div>
            <div class="field-value" id="view-nome">—</div>
        </div>
        <div class="field-row">
            <div class="field-label"><i class="fa-solid fa-envelope"></i> E-mail</div>
            <div class="field-value" id="view-email">—</div>
        </div>
        <div class="field-row">
            <div class="field-label"><i class="fa-solid fa-phone"></i> Telefone</div>
            <div class="field-value" id="view-telefone">—</div>
        </div>
        <div class="field-row field-row-last">
            <div class="field-label"><i class="fa-solid fa-lock"></i> Senha</div>
            <div class="field-value">••••••••</div>
        </div>
        <div class="card-actions">
            <button type="button" id="btn-editar" class="btn-edit">
                <i class="fa-solid fa-pen"></i> Editar informações
            </button>
        </div>
    </div>

    <!-- Modo edição (oculto por padrão) -->
    <form id="form-alterar" style="display:none">
        <div>
            <label for="nome">Nome</label>
            <input type="text" id="nome">
        </div>
        <div>
            <label for="email">E-mail</label>
            <input type="text" id="email">
        </div>
        <div>
            <label for="telefone">Telefone</label>
            <input type="text" id="telefone">
        </div>
        <div>
            <label for="senha">Senha</label>
            <input type="password" id="senha">
        </div>
        <div class="form-actions-row">
            <button type="button" id="enviar">Salvar alterações</button>
            <button id="cancelar" type="button">Cancelar</button>
        </div>
    </form>

    <div id="alerta" class="custom-alert"></div>

    <button type="button" id="delete-account" class="delete-btn">
        <i class="fa-solid fa-trash-can"></i> Excluir Conta
    </button>

    <script src="../js/cliente_alterar.js?v=3"></script>
    <script src="../js/valida_sessao.js"></script>

</body>
</html>
