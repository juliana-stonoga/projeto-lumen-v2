<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="cliente_alterar.css">
    <title>Minha Conta | Lúmen</title>
    <link rel="icon" type="image" href="../img/lumen.logo.png">

</head>

<body>

    <nav class="custom-navbar">
  
        <button class="back-btn" onclick="window.location.href='../home/home.html'">
                <i class="fa-solid fa-arrow-left"></i>
                Voltar
        </button>

        <a class="navbar-center-logo">
            <img src="../img/lumen.logo.png" alt="Logo LÚMEN" class="logo-navbar">
        </a>

    </nav>

    <div>
        <h1>Minha Conta</h1>
        <p>Edite suas informações pessoais abaixo:</p>
    </div>

    <form id="form-alterar">

        <div>
            <div>
                <label for="nome">Nome</label>
                <input type="text" id="nome">
                <input type="hidden" id="id">
            </div>
        </div>

        <div>
            <div>
                <label for="email">E-mail</label>
                <input type="text" id="email">
            </div>
        </div>

        <div>
            <div>
                <label for="telefone">Telefone</label>
                <input type="text" id="telefone">
            </div>
        </div>

        <div>
            <div>
                <label for="senha">Senha</label>
                <input type="password" id="senha">
            </div>
        </div>

        <div>
            <div>
                <button type="button" id="enviar" class="btn btn-primary">Salvar alterações</button>
                <button id="cancelar" type="button" class="btn btn-secondary" onclick="window.location.href='../home/home.html'">Cancelar</button>
            </div>
        </div>

    </form>
    
    <div id="alerta" class="custom-alert"></div>

        <button type="button" id="delete-account" class="delete-btn">Excluir Conta</button>

    <script src="../js/cliente_alterar.js?v=2"></script>
    <script src="../js/valida_sessao.js"></script>

</body>
</html>
