<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar</title>
    <link rel="stylesheet" href="cliente_novo.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="cadastro-page">

    <!-- Navbar -->
    <nav class="custom-navbar">

        <button class="back-btn" onclick="window.location.href='../index.html'">
            <i class="fa-solid fa-arrow-left"></i>
            Voltar
        </button>

        <img src="../img/lumen.logo.png" alt="Logo" class="logo-navbar">

    </nav>

    <!--Container login-->
    <div class="login-container">
        <div class="card login-card">
            <img src="../img/redondo.topo.png" alt="Topo do Card">
            <div class="card-body">
                <h4 class="card-title">Cadastrar</h4>

            <!-- Formulário de cadastro -->

                <div class="mb-3 mt-3">
                    <label for="nome" class="form-label">Nome</label>
                    <input 
                    type="text"
                    class="form-control" 
                    id="nome"
                    placeholder="Nome completo"
                    required>
                <span class="erro-input" id="erro-nome"></span>

                </div>

                <div>
                    <div class="mb-3 mt-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input 
                        type="email" 
                        class="form-control" 
                        id="email"
                        placeholder="E-mail"
                        required>
                    <span class="erro-input" id="erro-email"></span>
                    </div>
                </div>
                
                <div>
                    <div class="mb-3 mt-3">
                        <label for="telefone" class="form-label">Telefone</label>
                        <input 
                        type="text" 
                        class="form-control" 
                        id="telefone"
                        placeholder="Telefone"
                        required>
                        <span class="erro-input" id="erro-telefone"></span>

                    </div>
                </div>

                <div>
                    <div class="mb-3 mt-3">
                        <label for="senha" class="form-label">Senha</label>
                        <input 
                        type="password" 
                        class="form-control" 
                        id="senha"
                        placeholder="Senha"
                        required>
                    <span class="erro-input" id="erro-senha"></span>
                    </div>
                </div>
            </div>
        

        
            <div>
                <div class="mb-3 mt-3">
                    <button 
                    class="main-btn" 
                    id="enviar">
                    Enviar
                    </button>
                    <span id="mnsg"> </span>
                </div>
            </div>

            <div id="alerta" class="custom-alert"></div>

    <script src="../js/cliente_novo.js"></script>

</body>
</html>
